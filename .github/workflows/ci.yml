name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    # PalmierPro targets macOS 26 (Tahoe), arm64 only. Requires a macOS 26 runner image.
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          # Never cache .build/artifacts: binary targets (Sparkle xcframework) must
          # be re-fetched/extracted each run, else a stale cache breaks the build.
          path: |
            .build
            !.build/artifacts
          key: spm-v3-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-v3-${{ runner.os }}-

      - name: Resolve dependencies
        # Drop restored binary artifacts and workspace state so Sparkle's
        # xcframework is re-extracted at this repo's absolute path.
        run: |
          rm -rf .build/artifacts .build/workspace-state.json
          swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: swift test
